<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeless AI - Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0">
            <div class="p-6">
                <h1 class="text-xl font-bold text-white">🚀 Codeless AI</h1>
                <p class="text-xs text-slate-400 mt-1">Master Admin</p>
            </div>
            <nav class="px-3 space-y-1">
                <a href="#tenants" onclick="showSection('tenants')" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-indigo-400 bg-slate-800 border-l-4 border-indigo-500">
                    <span class="ml-3">📊 Tenants</span>
                </a>
                <a href="#avatars" onclick="showSection('avatars')" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors duration-200">
                    <span class="ml-3">🎭 Avatar Gallery</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <header class="sticky top-0 z-10 bg-slate-950/80 backdrop-blur-sm border-b border-slate-800">
                <div class="px-8 py-4 flex items-center justify-between">
                    <h2 class="text-2xl font-bold">Multi-Tenant Voice Agent Platform</h2>
                </div>
            </header>

            <div class="p-8 space-y-8">
                <!-- Tenants Section -->
                <div id="section-tenants">
                    <div class="bg-slate-900 rounded-xl shadow-lg border border-slate-800 p-6">
                        <h3 class="text-xl font-semibold mb-6">➕ Create New Tenant</h3>
                        <form id="tenant-form" class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Company Name</label>
                                <input type="text" id="company_name" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Domain</label>
                                <input type="text" id="domain" placeholder="localhost or example.com" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Avatar (Voice comes from avatar)</label>
                                <select id="avatar_select" onchange="updateAvatarPreview()" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                                    <option value="">-- Select Avatar --</option>
                                </select>
                                <div id="avatar_preview" class="mt-3"></div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Introduction Script</label>
                                <textarea id="introduction_script" rows="3" placeholder="Hello! I'm your AI assistant..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none transition"></textarea>
                            </div>
                            <button type="submit" class="px-6 py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 transition duration-200 font-medium active:scale-95">Create Tenant</button>
                        </form>
                    </div>

                    <div class="bg-slate-900 rounded-xl shadow-lg border border-slate-800 p-6 mt-8">
                        <h3 class="text-xl font-semibold mb-6">📊 Active Tenants</h3>
                        <div class="overflow-x-auto">
                            <table id="tenants-table" class="w-full">
                                <thead>
                                    <tr class="border-b border-slate-800">
                                        <th class="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase tracking-wide">Company</th>
                                        <th class="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase tracking-wide">Domain</th>
                                        <th class="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase tracking-wide">Avatar</th>
                                        <th class="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase tracking-wide">Status</th>
                                        <th class="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase tracking-wide">Actions</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Avatar Gallery Section -->
                <div id="section-avatars" class="hidden">
                    <div class="bg-slate-900 rounded-xl shadow-lg border border-slate-800 p-6">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-xl font-semibold">🎭 Avatar Gallery</h3>
                            <button onclick="showAvatarForm()" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 transition duration-200 font-medium active:scale-95 shadow-lg">+ Add Avatar</button>
                        </div>
                        <div id="avatar-form" class="hidden mb-6 p-6 bg-slate-800 rounded-lg border border-slate-700">
                            <div class="space-y-4">
                                <input type="text" id="avatar_name" placeholder="Avatar Name" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                <div>
                                    <label class="block text-sm font-medium text-slate-400 mb-2">Gender</label>
                                    <select id="avatar_gender" onchange="loadVoicesByGender()" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                        <option value="female">Female</option>
                                        <option value="male">Male</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-400 mb-2">Google Cloud Voice</label>
                                    <select id="avatar_voice" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                        <option value="">Loading voices...</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-400 mb-2">Browser TTS Voice (Fallback)</label>
                                    <select id="browser_voice" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                        <option value="">Default Browser Voice</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-400 mb-2">Upload Image</label>
                                    <input type="file" id="avatar_file" accept="image/*" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                </div>
                                <div id="create_avatar_preview" class="text-center"></div>
                                <div class="flex gap-3">
                                    <button onclick="createAvatar()" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 transition duration-200 font-medium">Create</button>
                                    <button onclick="document.getElementById('avatar-form').classList.add('hidden')" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition duration-200 font-medium">Cancel</button>
                                </div>
                            </div>
                        </div>
                        <div id="avatars-list" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Avatar Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 p-8 w-full max-w-lg">
            <h3 class="text-2xl font-bold mb-6">Edit Avatar</h3>
            <div class="space-y-4">
                <input type="text" id="edit_avatar_name" placeholder="Avatar Name" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Gender</label>
                    <select id="edit_avatar_gender" onchange="loadEditVoicesByGender()" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Google Cloud Voice</label>
                    <select id="edit_avatar_voice" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Browser TTS Voice (Fallback)</label>
                    <select id="edit_browser_voice" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="">Default Browser Voice</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Upload New Image (optional)</label>
                    <input type="file" id="edit_avatar_file" accept="image/*" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div id="edit_avatar_preview" class="text-center"></div>
                <div class="flex gap-3">
                    <button onclick="saveAvatarEdit()" class="flex-1 px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 transition duration-200 font-medium">Save</button>
                    <button onclick="closeEditModal()" class="flex-1 px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition duration-200 font-medium">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 p-8 w-full max-w-lg">
            <h3 class="text-2xl font-bold mb-4">Delete Avatar</h3>
            <p class="text-slate-400 mb-6">Are you sure you want to delete this avatar? This action cannot be undone.</p>
            <div class="flex gap-3">
                <button onclick="confirmDelete()" class="flex-1 px-4 py-2 rounded-lg bg-red-600 hover:bg-red-500 transition duration-200 font-medium">Delete</button>
                <button onclick="closeDeleteModal()" class="flex-1 px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition duration-200 font-medium">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast fixed top-5 right-5 bg-slate-900 border border-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl z-50 hidden"></div>

    <script>
        const API_URL = 'http://localhost:8000';
        let avatarsCache = [];
        let voicesCache = {};

        function showSection(section) {
            document.querySelectorAll('[id^="section-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`section-${section}`).classList.remove('hidden');
            document.querySelectorAll('nav a').forEach(a => {
                a.classList.remove('text-indigo-400', 'bg-slate-800', 'border-l-4', 'border-indigo-500');
                a.classList.add('text-slate-400');
            });
            event.target.closest('a').classList.remove('text-slate-400');
            event.target.closest('a').classList.add('text-indigo-400', 'bg-slate-800', 'border-l-4', 'border-indigo-500');
        }

        document.getElementById('tenant-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const avatarId = document.getElementById('avatar_select').value;
            
            const data = {
                company_name: document.getElementById('company_name').value,
                domain: document.getElementById('domain').value,
                introduction_script: document.getElementById('introduction_script').value,
                avatar_id: avatarId || null
            };

            try {
                const res = await fetch(`${API_URL}/admin/tenants`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!res.ok) throw new Error('Failed to create tenant');

                const result = await res.json();
                showToast('Tenant created successfully!', 'success');
                document.getElementById('tenant-form').reset();
                loadTenants();
            } catch (e) {
                showToast('Failed to create tenant: ' + e.message, 'error');
            }
        });

        async function loadTenants() {
            try {
                const res = await fetch(`${API_URL}/admin/tenants`);
                if (!res.ok) throw new Error('Failed to load tenants');
                
                const tenants = await res.json();
                const tbody = document.querySelector('#tenants-table tbody');
                tbody.innerHTML = tenants.map(t => {
                    const avatar = avatarsCache.find(a => a.id === t.avatar_id);
                    return `
                        <tr class="border-b border-slate-800 hover:bg-slate-800 transition duration-200">
                            <td class="py-3 px-4 font-medium">${t.company_name}</td>
                            <td class="py-3 px-4 text-slate-400">${t.domain}</td>
                            <td class="py-3 px-4 text-slate-400">${avatar ? avatar.name + ' (' + avatar.gender + ')' : 'N/A'}</td>
                            <td class="py-3 px-4">
                                <span class="px-3 py-1 text-xs rounded-full ${t.status === 'active' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}">
                                    ${t.status}
                                </span>
                            </td>
                            <td class="py-3 px-4">
                                <button onclick="openTenantDashboard('${t.id}')" class="px-3 py-1.5 text-sm rounded-lg bg-indigo-600 hover:bg-indigo-500 transition duration-200">Dashboard</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error('Load tenants error:', e);
                showToast('Failed to load tenants', 'error');
            }
        }

        async function loadVoices() {
            try {
                const res = await fetch(`${API_URL}/admin/voices`);
                if (!res.ok) throw new Error('Failed to load voices');
                voicesCache = await res.json();
                loadVoicesByGender();
            } catch (e) {
                console.error('Load voices error:', e);
            }
        }

        function loadVoicesByGender() {
            const gender = document.getElementById('avatar_gender').value;
            const select = document.getElementById('avatar_voice');
            const voices = voicesCache[gender] || [];
            
            select.innerHTML = voices.map(v => 
                `<option value="${v.name}">${v.label}</option>`
            ).join('');
        }

        function showAvatarForm() {
            document.getElementById('avatar-form').classList.remove('hidden');
            loadVoices();
            loadBrowserVoices();
        }

        function loadBrowserVoices() {
            const select = document.getElementById('browser_voice');
            const editSelect = document.getElementById('edit_browser_voice');
            
            if ('speechSynthesis' in window) {
                const voices = speechSynthesis.getVoices();
                const options = '<option value="">Default Browser Voice</option>' + 
                    voices.map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');
                
                if (select) select.innerHTML = options;
                if (editSelect) editSelect.innerHTML = options;
            }
        }

        // Load browser voices when available
        if ('speechSynthesis' in window) {
            speechSynthesis.onvoiceschanged = loadBrowserVoices;
        }

        document.getElementById('avatar_file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('create_avatar_preview').innerHTML = 
                        `<img src="${e.target.result}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #e5e7eb;">`;
                };
                reader.readAsDataURL(file);
            }
        });

        async function createAvatar() {
            const name = document.getElementById('avatar_name').value;
            const gender = document.getElementById('avatar_gender').value;
            const voice_name = document.getElementById('avatar_voice').value;
            const browser_voice_name = document.getElementById('browser_voice').value;
            const fileInput = document.getElementById('avatar_file');
            const file = fileInput.files[0];
            
            if (!name || !file || !voice_name) {
                showToast('Please fill all fields', 'error');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('name', name);
                formData.append('gender', gender);
                formData.append('voice_name', voice_name);
                if (browser_voice_name) formData.append('browser_voice_name', browser_voice_name);
                formData.append('image_file', file);
                
                const res = await fetch(`${API_URL}/admin/avatars`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!res.ok) throw new Error('Failed to create avatar');
                
                document.getElementById('avatar_name').value = '';
                document.getElementById('avatar_file').value = '';
                document.getElementById('create_avatar_preview').innerHTML = '';
                document.getElementById('avatar-form').classList.add('hidden');
                await loadAvatars();
                showToast('Avatar created successfully', 'success');
            } catch (e) {
                console.error('Create avatar error:', e);
                showToast('Failed to create avatar', 'error');
            }
        }

        async function loadAvatars() {
            try {
                const res = await fetch(`${API_URL}/admin/avatars`);
                if (!res.ok) throw new Error('Failed to load avatars');
                
                avatarsCache = await res.json();
                
                document.getElementById('avatars-list').innerHTML = avatarsCache.map(a => `
                    <div class="bg-slate-900 rounded-xl shadow-lg border border-slate-800 p-6 hover:shadow-xl hover:-translate-y-1 transition duration-200">
                        <img src="${a.image_data}" alt="${a.name}" class="w-24 h-24 rounded-full object-cover mx-auto border-3 border-slate-700">
                        <p class="text-center text-lg font-semibold mt-4">${a.name}</p>
                        <p class="text-center text-sm text-slate-400">${a.gender} - ${a.voice_name}</p>
                        <div class="flex gap-2 justify-center mt-4">
                            <button onclick="editAvatar('${a.id}')" class="px-3 py-1.5 text-sm rounded-lg bg-indigo-600 hover:bg-indigo-500 transition duration-200">Edit</button>
                            <button onclick="deleteAvatar('${a.id}')" class="px-3 py-1.5 text-sm rounded-lg bg-red-600 hover:bg-red-500 transition duration-200">Delete</button>
                        </div>
                    </div>
                `).join('');
                
                const select = document.getElementById('avatar_select');
                select.innerHTML = '<option value="">-- Select Avatar --</option>' + 
                    avatarsCache.map(a => `<option value="${a.id}">${a.name} (${a.gender})</option>`).join('');
            } catch (e) {
                console.error('Load avatars error:', e);
                showToast('Failed to load avatars', 'error');
            }
        }

        function updateAvatarPreview() {
            const select = document.getElementById('avatar_select');
            const avatarId = select.value;
            const preview = document.getElementById('avatar_preview');
            
            if (avatarId) {
                const avatar = avatarsCache.find(a => a.id === avatarId);
                if (avatar) {
                    preview.innerHTML = `
                        <div class="flex items-center gap-3 p-3 bg-slate-800 rounded-lg">
                            <img src="${avatar.image_data}" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
                            <div>
                                <p class="font-medium">${avatar.name}</p>
                                <p class="text-sm text-slate-400">${avatar.gender} - ${avatar.voice_name}</p>
                            </div>
                        </div>
                    `;
                }
            } else {
                preview.innerHTML = '';
            }
        }

        let currentEditAvatarId = null;
        let currentDeleteAvatarId = null;

        function loadEditVoicesByGender() {
            const gender = document.getElementById('edit_avatar_gender').value;
            const select = document.getElementById('edit_avatar_voice');
            const voices = voicesCache[gender] || [];
            
            select.innerHTML = voices.map(v => 
                `<option value="${v.name}">${v.label}</option>`
            ).join('');
        }

        async function editAvatar(avatarId) {
            currentEditAvatarId = avatarId;
            const avatar = avatarsCache.find(a => a.id === avatarId);
            
            if (!avatar) return;
            
            document.getElementById('edit_avatar_name').value = avatar.name;
            document.getElementById('edit_avatar_gender').value = avatar.gender;
            
            await loadVoices();
            loadEditVoicesByGender();
            loadBrowserVoices();
            
            document.getElementById('edit_avatar_voice').value = avatar.voice_name;
            if (avatar.browser_voice_name) {
                document.getElementById('edit_browser_voice').value = avatar.browser_voice_name;
            }
            
            document.getElementById('edit_avatar_preview').innerHTML = `
                <img src="${avatar.image_data}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #e5e7eb;">
            `;
            
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        document.getElementById('edit_avatar_file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('edit_avatar_preview').innerHTML = 
                        `<img src="${e.target.result}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #e5e7eb;">`;
                };
                reader.readAsDataURL(file);
            }
        });

        async function saveAvatarEdit() {
            const name = document.getElementById('edit_avatar_name').value;
            const gender = document.getElementById('edit_avatar_gender').value;
            const voice_name = document.getElementById('edit_avatar_voice').value;
            const browser_voice_name = document.getElementById('edit_browser_voice').value;
            const fileInput = document.getElementById('edit_avatar_file');
            const file = fileInput.files[0];
            
            if (!name || !voice_name) {
                showToast('Please fill all required fields', 'error');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('name', name);
                formData.append('gender', gender);
                formData.append('voice_name', voice_name);
                if (browser_voice_name) formData.append('browser_voice_name', browser_voice_name);
                if (file) {
                    formData.append('image_file', file);
                }
                
                const res = await fetch(`${API_URL}/admin/avatars/${currentEditAvatarId}`, {
                    method: 'PUT',
                    body: formData
                });
                
                if (!res.ok) throw new Error('Failed to update avatar');
                
                closeEditModal();
                await loadAvatars();
                showToast('Avatar updated successfully', 'success');
            } catch (e) {
                console.error('Update avatar error:', e);
                showToast('Failed to update avatar', 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            document.getElementById('edit_avatar_file').value = '';
            currentEditAvatarId = null;
        }

        function deleteAvatar(avatarId) {
            currentDeleteAvatarId = avatarId;
            document.getElementById('delete-modal').classList.remove('hidden');
        }

        async function confirmDelete() {
            try {
                const res = await fetch(`${API_URL}/admin/avatars/${currentDeleteAvatarId}`, {
                    method: 'DELETE'
                });
                
                if (!res.ok) throw new Error('Failed to delete avatar');
                
                closeDeleteModal();
                await loadAvatars();
                showToast('Avatar deleted successfully', 'success');
            } catch (e) {
                console.error('Delete avatar error:', e);
                showToast('Failed to delete avatar', 'error');
            }
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.add('hidden');
            currentDeleteAvatarId = null;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast fixed top-5 right-5 px-6 py-4 rounded-xl shadow-2xl z-50 ${type === 'success' ? 'bg-emerald-500/20 border border-emerald-500 text-emerald-400' : 'bg-red-500/20 border border-red-500 text-red-400'}`;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function openTenantDashboard(tenantId) {
            const baseUrl = window.location.origin;
            const path = window.location.pathname.includes('/admin/') ? '/admin/tenant-dashboard.html' : '/tenant-dashboard.html';
            window.open(`${baseUrl}${path}?id=${tenantId}`, '_blank');
        }

        // Initialize
        loadTenants();
        loadAvatars();
        loadVoices();
    </script>
</body>
</html>
