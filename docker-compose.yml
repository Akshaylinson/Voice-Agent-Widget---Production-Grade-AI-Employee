version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voice_agent_multi_tenant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # Mount source code for live updates
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/voice_agent_multi_tenant
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32_byte_base64_key_here_change_in_production}
      - MASTER_ADMIN_SECRET=${MASTER_ADMIN_SECRET:-change_this_secret}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  admin:
    build: ./admin
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
